# grimoire-void keymaps — direct everyday binds; grouped modes with bare keys.
bindsym button4 nop
bindsym button5 nop
bindgesture swipe:right focus next
bindgesture swipe:left  focus prev
bindgesture swipe:up    workspace prev
bindgesture swipe:down  workspace next

# applications
bindsym $mod+Return       exec $terminal
bindsym $mod+b            exec $browser
bindsym $mod+Shift+b      exec $incognito
bindsym $mod+Shift+Return exec $filemanager

# launchers / menus (wofi)
bindsym $mod+d       exec $launcher
bindsym $mod+Shift+d exec $run
bindsym $mod+grave   exec $window_switch
bindsym $mod+e       exec $emoji
bindsym $mod+Shift+e exec $powermenu

# window management
floating_modifier $mod
bindsym $mod+Shift+q kill
bindsym $mod+Shift+r reload
bindsym $mod+m fullscreen toggle
bindsym $mod+Shift+o layout toggle tabbed splitv splith
bindsym $mod+a splitv
bindsym $mod+Shift+a splith
bindsym $mod+space floating toggle; [floating con_id="__focused__"] move position center; [floating con_id="__focused__"] resize set 70ppt 75ppt
bindsym $mod+Shift+space [floating con_id="__focused__"] move position center; [floating con_id="__focused__"] resize set 70ppt 75ppt
bindsym $mod+n focus mode_toggle
bindsym $mod+Shift+x exec $lockscreen

# focus / move / resize
bindsym $mod+h focus left
bindsym $mod+j focus down
bindsym $mod+k focus up
bindsym $mod+l focus right
bindsym $mod+Left focus left
bindsym $mod+Down focus down
bindsym $mod+Up focus up
bindsym $mod+Right focus right
bindsym $mod+u focus parent
bindsym $mod+i focus child
bindsym $mod+Shift+h move left
bindsym $mod+Shift+j move down
bindsym $mod+Shift+k move up
bindsym $mod+Shift+l move right
bindsym $mod+Ctrl+h resize grow   width  20px or 5ppt
bindsym $mod+Ctrl+l resize shrink width  20px or 5ppt
bindsym $mod+Ctrl+k resize grow   height 20px or 5ppt
bindsym $mod+Ctrl+j resize shrink height 20px or 5ppt
bindsym $mod+Shift+n fullscreen toggle; focus next; fullscreen toggle
bindsym $mod+Shift+p fullscreen toggle; focus prev; fullscreen toggle

# workspaces
bindsym $mod+1 workspace $ws1
bindsym $mod+2 workspace $ws2
bindsym $mod+3 workspace $ws3
bindsym $mod+4 workspace $ws4
bindsym $mod+5 workspace $ws5
bindsym $mod+6 workspace $ws6
bindsym $mod+7 workspace $ws7
bindsym $mod+8 workspace $ws8
bindsym $mod+Shift+1 move container to workspace $ws1
bindsym $mod+Shift+2 move container to workspace $ws2
bindsym $mod+Shift+3 move container to workspace $ws3
bindsym $mod+Shift+4 move container to workspace $ws4
bindsym $mod+Shift+5 move container to workspace $ws5
bindsym $mod+Shift+6 move container to workspace $ws6
bindsym $mod+Shift+7 move container to workspace $ws7
bindsym $mod+Shift+8 move container to workspace $ws8
bindsym $mod+Tab workspace next_on_output
bindsym Mod1+Tab workspace prev_on_output

# screenshots
bindsym Print      exec $full_screenshot
bindsym $mod+Print exec $edit_screenshot

# grouped modes (bare keys; Escape exits)
mode "open" {
 bindsym p exec $pdfreader ; mode "default"
 bindsym m exec $musicplayer ; mode "default"
 bindsym b exec $blueman ; mode "default"
 bindsym a exec $audio_settings ; mode "default"
 bindsym w exec $backgrounds ; mode "default"
 bindsym Escape mode "default"
 bindsym Return mode "default"
 bindsym space  mode "default"
}
bindsym $mod+o mode "open"

mode "script" {
 bindsym b exec $waybarThemeSwitcher ; mode "default"
 bindsym t exec $wlsunset ; mode "default"
 bindsym w exec $chooseBackground ; mode "default"
 bindsym x exec $executables ; mode "default"
 bindsym Escape mode "default"
 bindsym Return mode "default"
 bindsym space  mode "default"
}
bindsym $mod+Shift+s mode "script"

mode "swap" {
 bindsym h mark --add "_swap"; focus left;  swap container with mark "_swap"; focus left;  unmark "_swap"; mode "default"
 bindsym j mark --add "_swap"; focus down;  swap container with mark "_swap"; focus down;  unmark "_swap"; mode "default"
 bindsym k mark --add "_swap"; focus up;    swap container with mark "_swap"; focus up;    unmark "_swap"; mode "default"
 bindsym l mark --add "_swap"; focus right; swap container with mark "_swap"; focus right; unmark "_swap"; mode "default"
 bindsym Escape mode "default"
}
bindsym $mod+Shift+u mode "swap"

mode "bookmarks" {
 bindsym m exec $bookmarks ; mode "default"
 bindsym Shift+m exec $bookmarks_private ; mode "default"
 bindsym n exec $bookmarks_window ; mode "default"
 bindsym c exec $bookmarks_category ; mode "default"
 bindsym Escape mode "default"
}
bindsym $mod+Shift+w mode "bookmarks"

mode "notify" {
 bindsym m exec makoctl restore ; mode "default"
 bindsym Shift+m exec makoctl dismiss --all ; mode "default"
 bindsym Escape mode "default"
}
bindsym $mod+Shift+m mode "notify"

# brightness
bindsym XF86MonBrightnessUp   exec brightnessctl set +5%
bindsym XF86MonBrightnessDown exec brightnessctl --min-value=1 set 5%-
bindsym $mod+F4 exec brightnessctl set +5%
bindsym $mod+F3 exec brightnessctl --min-value=1 set 5%-

# audio (wpctl)
bindsym XF86AudioRaiseVolume exec wpctl set-volume -l 1.3 @DEFAULT_AUDIO_SINK@ 5%+
bindsym XF86AudioLowerVolume exec wpctl set-volume        @DEFAULT_AUDIO_SINK@ 5%-
bindsym XF86AudioMute        exec wpctl set-mute          @DEFAULT_AUDIO_SINK@ toggle
bindsym XF86AudioMicMute     exec wpctl set-mute          @DEFAULT_AUDIO_SOURCE@ toggle
bindsym $mod+F7 exec wpctl set-volume -l 1.3 @DEFAULT_AUDIO_SINK@ 5%+
bindsym $mod+F6 exec wpctl set-volume        @DEFAULT_AUDIO_SINK@ 5%-
bindsym $mod+F5 exec wpctl set-mute          @DEFAULT_AUDIO_SINK@ toggle

# media (playerctl)
bindsym XF86AudioPlay  exec playerctl play-pause
bindsym XF86AudioPause exec playerctl pause
bindsym XF86AudioNext  exec playerctl next
bindsym XF86AudioPrev  exec playerctl previous
bindsym $mod+Shift+Up    exec playerctl play-pause
bindsym $mod+Shift+Down  exec playerctl pause
bindsym $mod+Shift+Right exec playerctl next
bindsym $mod+Shift+Left  exec playerctl previous
